# This is a Databricks asset bundle definition for finguard_dab.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: finguard_dab
  uuid: 6798d235-6a0d-4706-99e1-e0a22d1b67d4

include:
  - resources/**/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: dbc-5b18aab5-8a37.cloud.databricks.com
    permissions:
      - user_name: nikhithareddye08@gmail.com
        level: CAN_MANAGE
    variables:
      catalog: finguard
      schema: dev
  prod:
    mode: production
    workspace:
      host: http://127.0.0.1:7073
      # We explicitly deploy to /Workspace/Users/nikhithareddye08@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/nikhithareddye08@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: finguard
      schema: prod
    permissions:
      - user_name: nikhithareddye08@gmail.com
        level: CAN_MANAGE
